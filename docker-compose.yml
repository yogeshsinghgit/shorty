version: "3.9"

services:

  shorty-api:
    build: .
    container_name: shorty-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - redis
    env_file:
      - .env

  redis:
    image: redis:8.2
    container_name: shorty-redis
    restart: always
    ports:
      - "6379:6379"

